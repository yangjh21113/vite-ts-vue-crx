<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script type="module" crossorigin src="./popup.js"></script>
    <style>
      .container {
        min-width: 400px;
        min-height: 500px;
      }
      #videoCurrent {
        cursor: pointer;
      }
      table {
        border: 1px solid;
        white-space: nowrap;
      }
      td {
        padding: 10px;
        cursor: pointer;
      }
      .btn {
        background: pink;
      }
      .btn:hover {
        color: red;
      }
      .result {
        border: 1px solid;
      }
      #recordResult {
        width: 400px;
        height: 200px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <table>
        <tr>
          <th></th>
          <th>录屏</th>
          <th>截屏</th>
        </tr>
        <tr>
          <td>当前标签页</td>
          <td class="btn" id="recordBtn">录屏</td>
          <td class="btn">截屏</td>
        </tr>
      </table>
      <div class="result">
        <p>录屏结果</p>
        <video id="recordResult"  controls src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"></video>
      </div>
      <!-- <div class="result">
        <p>截屏结果</p>
        <video id=""></video>
      </div> -->
    </div>
  </body>
</html>
